# MPTVI — Laragon/Apache virtual host for LAN access
# -----------------------------------------------------------------
# Put this file in:   C:\laragon\etc\apache2\sites-enabled\mptvi.conf
# Then in Laragon:    Menu → Apache → Reload  (or restart Laragon)
#
# The app lives on a SEPARATE drive (D:) so it survives a C: / Windows
# reinstall. Adjust the paths below if you used a different drive/folder.
# DocumentRoot MUST point at the app's public/ folder.
#
# This is a *:80 default host, so the app answers at http://<server-ip>/
# from any PC on the office network. If port 80 is taken by another
# Laragon site, change BOTH the Listen line and *:80 to e.g. 8080 and
# have staff use http://<server-ip>:8080/.

# Listen 8080      # <- uncomment + set if using a non-80 port

<VirtualHost *:80>
    DocumentRoot "D:/mptvi/public"

    <Directory "D:/mptvi/public">
        AllowOverride All
        Require all granted
        Options FollowSymLinks
    </Directory>

    ErrorLog "D:/mptvi/storage/logs/apache-error.log"
</VirtualHost>
