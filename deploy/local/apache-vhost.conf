# MPTVI — Laragon/Apache virtual host for LAN access
# -----------------------------------------------------------------
# Put this file in:   C:\laragon\etc\apache2\sites-enabled\mptvi.conf
# Then in Laragon:    Menu → Apache → Reload  (or restart Laragon)
#
# The app lives on a SEPARATE drive (D:) so it survives a C: / Windows
# reinstall. Adjust the paths below if you used a different drive/folder.
# DocumentRoot MUST point at the app's public/ folder.
#
# Staff reach the app by NAME at  http://mptvi.com/  instead of an IP.
# For that name to resolve, each PC needs a "hosts" entry pointing
# mptvi.com at the server:
#   - server PC : 127.0.0.1   mptvi.com   (added by setup.bat)
#   - other PCs : <server-ip> mptvi.com   (added by client-hostname.bat)
# This is a *:80 host, so it also still answers at http://<server-ip>/.
# If port 80 is taken by another Laragon site, change BOTH the Listen
# line and *:80 to e.g. 8080 and have staff use http://mptvi.com:8080/.

# Listen 8080      # <- uncomment + set if using a non-80 port

<VirtualHost *:80>
    ServerName mptvi.com
    ServerAlias www.mptvi.com
    DocumentRoot "E:/mptvi-training-system/public"

    <Directory "E:/mptvi-training-system/public">
        AllowOverride All
        Require all granted
        Options FollowSymLinks
    </Directory>

    ErrorLog "E:/mptvi-training-system/storage/logs/apache-error.log"
</VirtualHost>
